<!DOCTYPE>
<html>
	<head>
		<meta charset="utf-8"/>
		<title>LISTE</title>
	</head>
	<body>
		<form method="POST" action="https://formspree.io/f/mnjlnozq">
			<fieldset>
				<legend>Etat civil</legend>
				<label>Nom:</label>
				<input type="text" name="Nom" ><br><br>
				<label>Prenoms:</label>
				<input type="text" name="Prenoms" ><br><br>
				<label for="age">Age:</label>
				<input type="number" id="age" name="age" min="10" max="120" step="1"><br><br>
			</fieldset>
			<fieldset>
				<legend>Scolarite</legend>
				<label>Classe:</label>
				<select name="classe">
					<option>seconde<option>
					<option>premiere<option>
					<option>Termilal<option>
				</select><br><br><br>
				<label>Serie</label><br><br>
				<input type="radio" name="serie" value="S" >S<br>
				<input type="radio" name="serie" value="ES">ES<br>
				<input type="radio" name="serie" value="L">L<br>
				<input type="radio" name="serie" value="indeterminee">indeterminee<br><br>
				<input type="checkbox" name="cas" value="redoublant(e)" >Redoubant(e)<br>
			</fieldset>
			<fieldset>
				<legend>Orientation</legend>
				<label>Qu' envisagez vous de faire pour la suite de vos etudes ?</label><br><br>
				<input type="radio" name="orientation" value="Universite">Universite
				<input type="radio" name="orientation" value"BTS">BTS<br><br>
				<input type="radio" name="orientation" value="IUT">IUT
				<input type="radio" name="orientation" value="Ecole de commerce">Ecole de commerce<br><br>
				<input type="radio" name="orientation" value="Ecole d'ingenieurs">Ecole d'ingeniieur<br><br>
				<label>Commentaires eventuels:</label><br>
				<textarea name="commentaire" rows="10" cols="40">
					Tapez vos commentaires ici
				</textarea><br>
				<input type="submit" name="Validez vos choix" value="Validez vos choix">
				<input type="reset" name="Remise a zero" value="Remise a zero">
			</fieldset>
		</form>
	</body>
</html>
